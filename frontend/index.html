<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Interview Chatbot (Research Prototype)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="chatBox" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:auto; margin-bottom:10px;"></div>

  <div class="wrap">
    <h2>AI Interview Chatbotsd</h2>

    <div class="card">
      <h3>Login (Password visible - prototype)</h3>
      <div class="row">
        <input id="username" placeholder="username" value="candidate1"/>
        <input id="password" placeholder="password (visible)" value="password123" />
        <button id="btnLogin">Login</button>
      <div class="row">
  <button id="record">🎤 Record Answer</button>
  <span id="recStatus" class="muted"></span>
</div>
  
      </div>
      <div id="loginStatus" class="muted"></div>
    </div>

    <div class="card">
      <h3>Interview</h3>
      <div id="chat" class="chat"></div>

      <div class="row">
        <input id="msg" placeholder="Type your answer..." />
        <button id="send">Send</button>
      </div>

      <div class="row">
        <button id="start">Start Interview</button>
      </div>

      <pre id="report" class="report"></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
